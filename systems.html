<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems - Community Policy Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Community Policy Hub</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="policies.html">Policies</a></li>
                <li><a href="systems.html">Systems</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Share Your Systems</h2>
            <p>Use this form to submit details about systems used to improve communities.</p>
            <form action="#" method="post">
                <fieldset>
                    <legend>System Information</legend>
                    <label for="system-name">System Name:</label>
                    <input type="text" id="system-name" name="system-name" required>
                    
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" required></textarea>
                    
                    <label for="government">Government Entity:</label>
                    <input type="text" id="government" name="government" required>
                    
                    <label for="year">Year Implemented:</label>
                    <input type="number" id="year" name="year" min="1900" max="2030" required>
                    
                    <button type="submit">Submit System</button>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>
